apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: otu-demo-vm
  namespace: default
  annotations:
    # Tracks the specific template version signature from your template metadata
    template-version.harvesterhci.io/customName: 1F4QH8htFg
    # Configured to use your exact SLES image: harvester-public/image-6rv2r
    harvesterhci.io/volumeClaimTemplates: >-
      [{"metadata":{"name":"otu-demo-vm-disk-0","annotations":{"harvesterhci.io/imageId":"harvester-public/image-6rv2r"}},"spec":{"accessModes":["ReadWriteMany"],"resources":{"requests":{"storage":"10Gi"}},"volumeMode":"Block","storageClassName":"longhorn-image-6rv2r"}}]
    network.harvesterhci.io/ips: '[]'
  labels:
    # Keeps the UI link intact so Harvester displays this under the template's lineage
    template.harvesterhci.io/templateID: dsc-sles-instance
    harvesterhci.io/os: linux
    harvesterhci.io/creator: harvester
    harvesterhci.io/vm: otu-demo-vm
spec:
  runStrategy: RerunOnFailure
  template:
    metadata:
      annotations:
        harvesterhci.io/sshNames: '[]'
      labels:
        harvesterhci.io/vmName: otu-demo-vm
    spec:
      affinity: {}
      domain:
        cpu:
          cores: 4
          sockets: 1
          threads: 1
        devices:
          disks:
            - bootOrder: 1
              disk:
                bus: virtio
              name: disk-0
            - disk:
                bus: virtio
              name: cloudinitdisk
          inputs:
            - bus: usb
              name: tablet
              type: tablet
          interfaces:
            - bridge: {}
              model: virtio
              name: default
        features:
          acpi:
            enabled: true
        machine:
          type: q35
        resources:
          limits:
            cpu: '4'
            memory: 8Gi
      evictionStrategy: LiveMigrateIfPossible
      networks:
        - name: default
          multus:
            # Successfully points to your designated presentation VLAN network
            networkName: harvester-public/vlan2229 
      terminationGracePeriodSeconds: 120
      volumes:
        - name: disk-0
          persistentVolumeClaim:
            claimName: otu-demo-vm-disk-0  # Unified with volumeClaimTemplates above
        - name: cloudinitdisk
          cloudInitNoCloud:
            secretRef:
              name: otu-demo-vm-cloudinit
            networkDataSecretRef:
              name: otu-demo-vm-cloudinit
      hostname: otu-demo-vm
